services:
  postgres:
    image: docker.io/library/postgres:18.4-alpine3.24
    environment:
      POSTGRES_DB: spbu_ops
      POSTGRES_USER: spbu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spbu-local-only}
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+ memindahkan PGDATA ke /var/lib/postgresql/<major>/docker.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spbu -d spbu_ops"]
      interval: 5s
      timeout: 3s
      retries: 15

  object-storage:
    # SeaweedFS menggantikan image MinIO yang sudah diarsipkan dan masih S3-compatible.
    image: docker.io/chrislusf/seaweedfs:4.39
    command:
      - mini
      - -dir=/data
      # Signed URLs do not use cookies; wildcard CORS is limited to local object storage.
      - -s3.allowedOrigins=${S3_ALLOWED_ORIGINS:-*}
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-pli-local-access}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-pli-local-secret-change-me}
      S3_BUCKET: ${S3_BUCKET:-pli-documents}
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - storage-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: localhost/putra-laskar-dashboard-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    environment:
      NODE_ENV: development
      ALLOW_LOCAL_SEED: "true"
      API_HOST: 0.0.0.0
      API_PORT: 8787
      WEB_ORIGIN: http://localhost:5173
      ALLOWED_WEB_ORIGINS: http://localhost:5173
      ALLOW_PRIVATE_NETWORK_ORIGINS: "true"
      PRIVATE_NETWORK_WEB_PORTS: 5173,4173
      REQUIRE_CLIENT_PROVENANCE: "false"
      NATIVE_CLIENT_KEY_HASHES: "{}"
      TRUST_PROXY: "false"
      DATABASE_URL: postgres://spbu:${POSTGRES_PASSWORD:-spbu-local-only}@postgres:5432/spbu_ops
      DB_POOL_MAX: 10
      REGISTRATION_CODE_SECRET: ${REGISTRATION_CODE_SECRET:-replace-this-local-registration-secret}
      SESSION_TTL_HOURS: 12
      SESSION_COOKIE_NAME: pli_session
      SESSION_COOKIE_SECURE: "false"
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-yudhizz14@gmail.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMeLocal123!}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Mr.Yudhistira}
      # URL ditandatangani untuk browser host, bukan hostname internal Compose.
      S3_ENDPOINT: http://localhost:8333
      # Endpoint antar-container untuk upload avatar kecil melalui API.
      S3_INTERNAL_ENDPOINT: http://object-storage:8333
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-pli-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-pli-local-access}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-pli-local-secret-change-me}
      S3_FORCE_PATH_STYLE: "true"
      S3_PRESIGN_TTL_SECONDS: 900
      S3_REQUEST_TIMEOUT_MS: 7500
    command:
      - /bin/sh
      - -c
      - >-
        node apps/api/dist/db/migrate.js &&
        node apps/api/dist/db/seed.js &&
        node apps/api/dist/db/bootstrapAdmin.js &&
        exec node apps/api/dist/server.js
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 8s
      timeout: 4s
      retries: 15

  web:
    image: localhost/putra-laskar-dashboard-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8787/api/v1
        VITE_USE_MOCKS: "false"
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 4173
      HOST: 0.0.0.0
    ports:
      - "5173:4173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 8s
      timeout: 4s
      retries: 10

volumes:
  postgres-data:
  storage-data:
